<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prepositions: AT · IN · ON</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f0f4ff;--surface:#e8eeff;--card:#fff;
  --border:#d4dcff;--border2:#b0beff;
  --ink:#111827;--ink2:#4b5280;--muted:#9ba3cc;
  --at:#7c3aed;--at-l:rgba(124,58,237,.11);--at-b:rgba(124,58,237,.28);
  --in:#0d9488;--in-l:rgba(13,148,136,.11);--in-b:rgba(13,148,136,.28);
  --on:#ea580c;--on-l:rgba(234,88,12,.11);--on-b:rgba(234,88,12,.28);
  --mix:#2563eb;--mix-l:rgba(37,99,235,.1);
  --green:#15803d;--gbg:rgba(21,128,61,.09);
  --red:#b91c1c;--rbg:rgba(185,28,28,.08);
  --gold:#b45309;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:'Nunito',sans-serif;min-height:100vh}
.hdr{background:linear-gradient(135deg,#4f46e5 0%,#7c3aed 40%,#0d9488 100%);padding:18px 22px;display:flex;align-items:center;gap:14px;}
.hdr-icon{width:50px;height:50px;border-radius:14px;flex-shrink:0;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:1.5rem;}
.hdr-text h1{font-size:1.25rem;font-weight:900;color:#fff;letter-spacing:-.02em}
.hdr-text p{font-size:.73rem;color:rgba(255,255,255,.55);margin-top:2px}
.hdr-pts{margin-left:auto;text-align:right}
.hdr-pts-num{font-family:'DM Mono',monospace;font-size:2rem;font-weight:500;color:#fde68a;line-height:1}
.hdr-pts-lbl{font-size:.6rem;color:rgba(255,255,255,.4)}
.big3{background:var(--ink);display:flex;}
.b3{flex:1;padding:14px 10px;text-align:center;cursor:pointer;transition:all .2s;border-bottom:4px solid transparent;}
.b3:hover{background:rgba(255,255,255,.06)}
.b3.active-at {background:var(--at-l);border-bottom-color:var(--at)}
.b3.active-in {background:var(--in-l);border-bottom-color:var(--in)}
.b3.active-on {background:var(--on-l);border-bottom-color:var(--on)}
.b3.active-mix{background:var(--mix-l);border-bottom-color:var(--mix)}
.b3-word{font-family:'DM Mono',monospace;font-size:1.4rem;font-weight:500;color:#fff;line-height:1;}
.b3.active-at  .b3-word{color:#c4b5fd}
.b3.active-in  .b3-word{color:#5eead4}
.b3.active-on  .b3-word{color:#fdba74}
.b3.active-mix .b3-word{color:#93c5fd}
.b3-sub{font-size:.62rem;color:rgba(255,255,255,.38);margin-top:4px;text-transform:uppercase;letter-spacing:.05em}
.stabs{background:var(--surface);border-bottom:1px solid var(--border);display:flex;overflow-x:auto;scrollbar-width:none;padding:0 14px;}
.stabs::-webkit-scrollbar{display:none}
.st{padding:9px 16px;cursor:pointer;white-space:nowrap;font-size:.72rem;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);border-bottom:2.5px solid transparent;margin-bottom:-1px;transition:all .18s;background:none;border-top:none;border-left:none;border-right:none;font-family:'Nunito',sans-serif;}
.st:hover{color:var(--ink2)}
.st.at-s {color:var(--at);border-bottom-color:var(--at)}
.st.in-s {color:var(--in);border-bottom-color:var(--in)}
.st.on-s {color:var(--on);border-bottom-color:var(--on)}
.st.mix-s{color:var(--mix);border-bottom-color:var(--mix)}
.prog{height:3px;background:var(--border)}
.pf{height:100%;transition:width .4s ease}
.sec{display:none}.sec.active{display:block}
.wrap{max-width:720px;margin:0 auto;padding:20px 13px 80px}
.ref{background:var(--card);border:1.5px solid var(--border);border-radius:16px;padding:18px 20px;margin-bottom:18px;overflow:hidden;}
.ref-title{font-size:.68rem;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:14px}
.ref-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
@media(max-width:500px){.ref-grid{grid-template-columns:1fr}}
.rbox{border-radius:11px;padding:12px 13px;border:1.5px solid}
.rbox-word{font-family:'DM Mono',monospace;font-size:1.2rem;font-weight:500;margin-bottom:8px}
.rbox-items{font-size:.73rem;line-height:1.7;color:var(--ink2)}
.rbox-items span{display:block}
.rbox-at{background:var(--at-l);border-color:var(--at-b)}.rbox-at .rbox-word{color:var(--at)}
.rbox-in{background:var(--in-l);border-color:var(--in-b)}.rbox-in .rbox-word{color:var(--in)}
.rbox-on{background:var(--on-l);border-color:var(--on-b)}.rbox-on .rbox-word{color:var(--on)}
.stats{display:flex;gap:8px;margin-bottom:16px}
.stat{flex:1;background:var(--card);border:1.5px solid var(--border);border-radius:11px;padding:9px 10px;text-align:center}
.sv{font-family:'DM Mono',monospace;font-size:1.3rem;font-weight:500;line-height:1}
.sl{font-size:.6rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-top:2px}
.qcard{background:var(--card);border:2px solid var(--border);border-radius:15px;overflow:hidden;margin-bottom:12px;transition:border-color .22s,box-shadow .22s;}
.qcard.ok  {border-color:var(--green);box-shadow:0 2px 10px rgba(21,128,61,.1)}
.qcard.fail{border-color:var(--red);box-shadow:0 2px 10px rgba(185,28,28,.09)}
.qcard-top{padding:14px 17px 11px;border-bottom:1px solid var(--border)}
.qmeta{display:flex;align-items:center;gap:7px;margin-bottom:8px;flex-wrap:wrap}
.qnum{width:27px;height:27px;border-radius:7px;flex-shrink:0;background:var(--surface);border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:.7rem;color:var(--ink2);font-weight:500;}
.qcard.ok   .qnum{background:var(--green);color:#fff;border-color:var(--green)}
.qcard.fail .qnum{background:var(--red);color:#fff;border-color:var(--red)}
.qtag{font-size:.6rem;font-weight:800;letter-spacing:.07em;text-transform:uppercase;padding:2px 8px;border-radius:20px}
.tg-at {background:var(--at-l);color:var(--at)}
.tg-in {background:var(--in-l);color:var(--in)}
.tg-on {background:var(--on-l);color:var(--on)}
.tg-mix{background:var(--mix-l);color:var(--mix)}
.tg-err{background:rgba(180,83,9,.1);color:var(--gold)}
.tg-neg{background:rgba(185,28,28,.1);color:var(--red)}
.qlbl{font-size:.62rem;color:var(--muted);margin-left:auto;font-family:'DM Mono',monospace}
.qinstr{font-size:.76rem;color:var(--ink2);margin-bottom:7px;line-height:1.5}
.qsent{background:var(--surface);border:1.5px solid var(--border);border-radius:9px;padding:11px 14px;font-size:.95rem;line-height:1.75;color:var(--ink);font-weight:700;}
.qsent .gap{display:inline-block;min-width:55px;border-bottom:2.5px solid var(--muted);text-align:center;color:var(--muted);font-style:italic;font-weight:400;margin:0 3px;font-size:.86rem;}
.qsent .ew{background:rgba(185,28,28,.1);border-bottom:2px solid var(--red);padding:1px 4px;border-radius:4px;color:var(--red);font-weight:700;}
.sig{display:inline-flex;align-items:center;gap:5px;margin-top:6px;font-size:.65rem;color:var(--muted);background:rgba(255,255,255,.7);border:1px solid var(--border);border-radius:5px;padding:2px 8px;font-family:'DM Mono',monospace;}
.opts{display:flex;flex-direction:column;gap:7px;padding:12px 15px}
.opt{display:flex;align-items:center;gap:8px;background:var(--surface);border:2px solid var(--border);border-radius:9px;padding:9px 13px;cursor:pointer;font-size:.86rem;font-weight:600;color:var(--ink);transition:all .14s;user-select:none;}
.opt:hover:not(.dis){border-color:var(--at);background:var(--at-l)}
.opt.ok {border-color:var(--green);background:var(--gbg);color:var(--green);font-weight:800}
.opt.bad{border-color:var(--red);background:var(--rbg);color:var(--red)}
.opt.dis{cursor:default}
.ol{width:24px;height:24px;flex-shrink:0;border-radius:6px;border:2px solid var(--border);background:var(--card);display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:.68rem;font-weight:700;}
.opt.ok  .ol{background:var(--green);color:#fff;border-color:var(--green)}
.opt.bad .ol{background:var(--red);color:#fff;border-color:var(--red)}
.three-btns{display:flex;gap:10px;padding:12px 15px}
.prep-btn{flex:1;padding:11px 8px;border-radius:11px;border:2px solid var(--border);font-family:'DM Mono',monospace;font-size:1.1rem;font-weight:500;cursor:pointer;transition:all .15s;background:var(--surface);color:var(--ink);text-align:center;}
.prep-btn:hover:not(.dis){transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.08)}
.prep-btn.at:hover:not(.dis){border-color:var(--at);background:var(--at-l);color:var(--at)}
.prep-btn.in:hover:not(.dis){border-color:var(--in);background:var(--in-l);color:var(--in)}
.prep-btn.on:hover:not(.dis){border-color:var(--on);background:var(--on-l);color:var(--on)}
.prep-btn.ok {border-color:var(--green);background:var(--gbg);color:var(--green);font-weight:700}
.prep-btn.bad{border-color:var(--red);background:var(--rbg);color:var(--red)}
.prep-btn.dis{cursor:default;opacity:.7}
.prep-btn-lbl{font-size:.6rem;display:block;margin-top:2px;font-family:'Nunito',sans-serif;font-weight:600;opacity:.7}
.write-area{padding:12px 15px}
.wr{display:flex;gap:7px;align-items:center;flex-wrap:wrap}
.wi{background:var(--surface);border:2px solid var(--border);border-radius:9px;padding:8px 13px;color:var(--ink);font-family:'DM Mono',monospace;font-size:.9rem;font-weight:500;flex:1;min-width:140px;outline:none;transition:border-color .2s;}
.wi:focus{border-color:var(--at)}
.wi.ok  {border-color:var(--green);background:var(--gbg);color:var(--green)}
.wi.fail{border-color:var(--red);background:var(--rbg)}
.wi:disabled{opacity:.85}
.chk{background:var(--at);color:#fff;border:none;border-radius:9px;padding:8px 18px;font-family:'Nunito',sans-serif;font-size:.83rem;font-weight:800;cursor:pointer;transition:opacity .2s;white-space:nowrap;}
.chk:hover{opacity:.85}
.chk:disabled{background:var(--border);color:var(--muted);cursor:default}
.fb{margin:0 15px 13px;padding:11px 13px;border-radius:9px;font-size:.79rem;line-height:1.65;display:none}
.fb.show{display:block}
.fb.ok  {background:var(--gbg);border:1px solid rgba(21,128,61,.22);color:#14532d}
.fb.fail{background:var(--rbg);border:1px solid rgba(185,28,28,.18);color:#7f1d1d}
.fb .cor{margin-top:7px;padding:7px 11px;background:rgba(21,128,61,.1);border-radius:7px;font-family:'DM Mono',monospace;font-size:.8rem;color:#14532d;font-weight:500}
.fb .rn {margin-top:6px;padding:7px 11px;background:rgba(255,255,255,.7);border:1px solid var(--border);border-radius:7px;font-size:.76rem;color:var(--ink2)}
.fb .rn strong{color:var(--ink)}
.done{background:var(--card);border:2px solid var(--border);border-radius:18px;padding:34px 22px;text-align:center;display:none;margin-bottom:16px}
.done.show{display:block}
.done-emoji{font-size:3rem;margin-bottom:10px}
.done-score{font-family:'DM Mono',monospace;font-size:3.3rem;font-weight:500;line-height:1}
.done-lbl{font-size:.78rem;color:var(--muted);margin-bottom:12px}
.done-grade{font-size:.95rem;font-weight:800;margin-bottom:14px}
.done-chips{display:flex;gap:7px;justify-content:center;flex-wrap:wrap;margin-bottom:18px}
.dc{padding:6px 13px;border-radius:20px;font-size:.73rem;font-weight:800}
.dc-ok {background:var(--gbg);color:var(--green)}
.dc-fail{background:var(--rbg);color:var(--red)}
.dc-pts{background:rgba(180,83,9,.1);color:var(--gold)}
.done-btns{display:flex;gap:7px;justify-content:center;flex-wrap:wrap}
.db{padding:9px 20px;border-radius:9px;border:none;font-family:'Nunito',sans-serif;font-size:.83rem;font-weight:800;cursor:pointer;transition:all .2s}
.db-p{background:linear-gradient(135deg,var(--at),var(--in));color:#fff}.db-p:hover{opacity:.85}
.db-s{background:var(--surface);border:1.5px solid var(--border);color:var(--ink2)}.db-s:hover{border-color:var(--at);color:var(--at)}
@keyframes up{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.qcard{animation:up .27s ease both}
.qcard:nth-child(2){animation-delay:.04s}.qcard:nth-child(3){animation-delay:.08s}
.qcard:nth-child(4){animation-delay:.12s}.qcard:nth-child(5){animation-delay:.16s}
.qcard:nth-child(6){animation-delay:.20s}.qcard:nth-child(7){animation-delay:.24s}
.qcard:nth-child(8){animation-delay:.28s}.qcard:nth-child(9){animation-delay:.32s}
.qcard:nth-child(10){animation-delay:.36s}.qcard:nth-child(11){animation-delay:.40s}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-icon">📍</div>
  <div class="hdr-text"><h1>AT &nbsp;·&nbsp; IN &nbsp;·&nbsp; ON</h1><p>Prepositions of Time & Place · Selección · Writing · Errores</p></div>
  <div class="hdr-pts"><div class="hdr-pts-num" id="g-pts">0</div><div class="hdr-pts-lbl">puntos</div></div>
</div>
<div class="big3" id="big3">
  <div class="b3 active-at" id="b3-0" onclick="switchBig(0)"><div class="b3-word">AT</div><div class="b3-sub">Punto exacto</div></div>
  <div class="b3" id="b3-1" onclick="switchBig(1)"><div class="b3-word">IN</div><div class="b3-sub">Interior / período</div></div>
  <div class="b3" id="b3-2" onclick="switchBig(2)"><div class="b3-word">ON</div><div class="b3-sub">Superficie / día</div></div>
  <div class="b3" id="b3-3" onclick="switchBig(3)"><div class="b3-word">MIX</div><div class="b3-sub">Todos mezclados</div></div>
</div>
<div class="stabs" id="stabs"></div>
<div class="prog"><div class="pf" id="pf" style="width:0%"></div></div>
<div id="sections"></div>
<script>
var DATA=[
{big:0,id:'at-time',label:'AT – Tiempo',stab:'at-s',color:'var(--at)',
qs:[
  {type:'3btn',tag:'tg-at',lbl:'AT – Time',qtype:'Tiempo',instr:'Choose the correct preposition:',sent:"She wakes up _____ 6 o'clock every morning.",sig:'specific time',ans:'at',cor:'She wakes up <strong>at</strong> 6 o\'clock.',exp:'Use <strong>AT</strong> for exact times: at 6 o\'clock, at noon, at midnight, at 3:30 pm.',rule:'<strong>AT</strong> + exact time (at 9am · at noon · at midnight)'},
  {type:'mc',tag:'tg-at',lbl:'AT – Time',qtype:'Tiempo',instr:'Choose the correct preposition:',sent:'We always eat together _____ Christmas.',sig:'holiday / celebration',opts:['at','in','on','during'],ans:0,cor:'We eat together <strong>at</strong> Christmas.',exp:'<strong>AT</strong> for holidays and celebrations: at Christmas, at Easter, at New Year.',rule:'<strong>AT</strong> + holidays (at Christmas · at Easter · at New Year)'},
  {type:'write',tag:'tg-at',lbl:'AT – Time',qtype:'Escribir',instr:"Complete with AT, IN, or ON:",sent:"The meeting starts _____ noon. Don't be late!",sig:'noon',hint:'noon = AT',answers:['at'],cor:'The meeting starts <strong>at</strong> noon.',exp:'AT noon, AT midnight, AT midday — these are specific time points.',rule:'<strong>AT</strong> noon · midnight · midday · the weekend (BrE)'},
  {type:'3btn',tag:'tg-at',lbl:'AT – Time',qtype:'Tiempo',instr:'Choose the correct preposition:',sent:"I'll call you _____ the weekend.",sig:'weekend (BrE)',ans:'at',cor:"I'll call you <strong>at</strong> the weekend. (British English)",exp:'<strong>AT the weekend</strong> (British English). Note: American English uses "ON the weekend."',rule:'<strong>AT</strong> the weekend (BrE) / <strong>ON</strong> the weekend (AmE)'},
  {type:'mc',tag:'tg-err',lbl:'Error',qtype:'Error',instr:'Find the INCORRECT sentence:',sent:'Which sentence has an error?',sig:'AT – error',opts:["She arrived at midnight.","The class starts at 8 in the morning.","He was born in 9 o'clock.","They met at lunchtime."],ans:2,cor:'"He was born <strong>at</strong> 9 o\'clock."',exp:'"In 9 o\'clock" is wrong. Exact times always use <strong>AT</strong>.',rule:'<strong>AT</strong> + time — never IN with clock times'},
  {type:'write',tag:'tg-at',lbl:'AT – Time',qtype:'Escribir',instr:'Fill in the blank:',sent:'She always feels lonely _____ night.',sig:'night',hint:'at night (fixed expression)',answers:['at'],cor:'She always feels lonely <strong>at</strong> night.',exp:'"<strong>At night</strong>" is a fixed expression. Also: at dawn, at dusk, at the moment.',rule:'<strong>AT</strong> night · dawn · dusk · the moment · the same time'}
]},
{big:0,id:'at-place',label:'AT – Lugar',stab:'at-s',color:'var(--at)',
qs:[
  {type:'3btn',tag:'tg-at',lbl:'AT – Place',qtype:'Lugar',instr:'Choose the correct preposition:',sent:"I'll meet you _____ the bus stop.",sig:'specific point / location',ans:'at',cor:"I'll meet you <strong>at</strong> the bus stop.",exp:'<strong>AT</strong> for a specific point or location: at the bus stop, at the door, at the corner.',rule:'<strong>AT</strong> = specific point/location (at the door · at the corner · at the top)'},
  {type:'mc',tag:'tg-at',lbl:'AT – Place',qtype:'Lugar',instr:'Choose the correct preposition:',sent:"She's studying _____ university right now.",sig:'institution / activity',opts:['at','in','on','by'],ans:0,cor:"She's studying <strong>at</strong> university.",exp:'<strong>AT</strong> for institutions when referring to the activity/purpose: at school, at university, at work, at home.',rule:'<strong>AT</strong> school · university · work · home · the office'},
  {type:'write',tag:'tg-at',lbl:'AT – Place',qtype:'Escribir',instr:'Fill in with AT, IN, or ON:',sent:'Can you wait for me _____ the entrance?',sig:'entrance / point',hint:'specific point = AT',answers:['at'],cor:'Can you wait for me <strong>at</strong> the entrance?',exp:'<strong>AT</strong> the entrance = a specific point.',rule:'<strong>AT</strong> + specific point (entrance · exit · top · bottom · end)'},
  {type:'3btn',tag:'tg-at',lbl:'AT – Place',qtype:'Lugar',instr:'Choose the correct preposition:',sent:'There were 500 people _____ the concert last night.',sig:'event / venue',ans:'at',cor:'There were 500 people <strong>at</strong> the concert.',exp:'<strong>AT</strong> for events and venues: at the concert, at the party, at the airport.',rule:'<strong>AT</strong> + events & venues (concert · party · airport · station)'},
  {type:'mc',tag:'tg-err',lbl:'Error',qtype:'Error',instr:'Find the INCORRECT sentence:',sent:'Which one has an error?',sig:'AT place – error',opts:["She's at home studying.","He works at the hospital.","I left my bag in the bus stop.","Meet me at the corner of 5th and Main."],ans:2,cor:'"I left my bag <strong>at</strong> the bus stop."',exp:'"In the bus stop" is wrong. Bus stop is a point, not an enclosed space → <strong>AT</strong>.',rule:'Bus stop · corner · door → specific points → <strong>AT</strong>'},
  {type:'write',tag:'tg-at',lbl:'AT – Place',qtype:'Escribir',instr:'Complete the sentence:',sent:"I'll see you _____ the airport at 7pm.",sig:'airport / point',hint:'airport = AT',answers:['at'],cor:"I'll see you <strong>at</strong> the airport.",exp:'Airports, stations and similar venues → <strong>AT</strong>.',rule:'<strong>AT</strong> the airport · station · hotel · hospital (as visitor)'}
]},
{big:1,id:'in-time',label:'IN – Tiempo',stab:'in-s',color:'var(--in)',
qs:[
  {type:'3btn',tag:'tg-in',lbl:'IN – Time',qtype:'Tiempo',instr:'Choose the correct preposition:',sent:'She was born _____ 1995.',sig:'year',ans:'in',cor:'She was born <strong>in</strong> 1995.',exp:'<strong>IN</strong> for years, months, seasons and longer periods: in 1995, in March, in summer.',rule:'<strong>IN</strong> + year · month · season · century (in 2024 · in July · in summer)'},
  {type:'mc',tag:'tg-in',lbl:'IN – Time',qtype:'Tiempo',instr:'Choose the correct preposition:',sent:'The flowers bloom _____ spring.',sig:'season',opts:['in','at','on','during'],ans:0,cor:'The flowers bloom <strong>in</strong> spring.',exp:'<strong>IN</strong> for seasons: in spring, in summer, in autumn/fall, in winter.',rule:'<strong>IN</strong> + seasons (in spring · summer · autumn · winter)'},
  {type:'write',tag:'tg-in',lbl:'IN – Time',qtype:'Escribir',instr:'Fill in with AT, IN, or ON:',sent:'I usually go on vacation _____ August.',sig:'month',hint:'month = IN',answers:['in'],cor:'I go on vacation <strong>in</strong> August.',exp:'<strong>IN</strong> for months: in January, in February... in December.',rule:'<strong>IN</strong> + month (in January · in August · in December)'},
  {type:'3btn',tag:'tg-in',lbl:'IN – Time',qtype:'Tiempo',instr:'Choose the correct preposition:',sent:"I'll finish this project _____ two hours.",sig:'in + duration',ans:'in',cor:"I'll finish this <strong>in</strong> two hours.",exp:'"<strong>In</strong> + time" = after a period of time from now.',rule:'<strong>IN</strong> + time = after a period (in 2 hours · in a week · in a moment)'},

var BIG_TABS=[
{label:‘AT’, sub:‘at-s’,  activeClass:‘active-at’,  color:‘var(–at)’,  ids:[‘at-time’,‘at-place’]},
{label:‘IN’, sub:‘in-s’,  activeClass:‘active-in’,  color:‘var(–in)’,  ids:[‘in-time’,‘in-place’]},
{label:‘ON’, sub:‘on-s’,  activeClass:‘active-on’,  color:‘var(–on)’,  ids:[‘on-time’,‘on-place’]},
{label:‘MIX’,sub:‘mix-s’, activeClass:‘active-mix’, color:‘var(–mix)’, ids:[‘mix-time’,‘mix-place’]}
];
var bigIdx=0, curSub={}, state={}, pts=0;
BIG_TABS.forEach(function(*,i){curSub[i]=0;});
DATA.forEach(function(sec){state[sec.id]={};sec.qs.forEach(function(*,qi){state[sec.id][qi]={answered:false,correct:false};});});

function sectionsForBig(bi){return DATA.filter(function(d){return d.big===bi;});}

function switchBig(bi){
bigIdx=bi;
BIG_TABS.forEach(function(_,i){var el=document.getElementById(‘b3-’+i);el.className=‘b3’+(i===bi?’ ‘+BIG_TABS[i].activeClass:’’);});
buildSubtabs(); renderCurrent(); window.scrollTo({top:0,behavior:‘smooth’});
}

function buildSubtabs(){
var stabs=document.getElementById(‘stabs’); stabs.innerHTML=’’;
var secs=sectionsForBig(bigIdx);
secs.forEach(function(sec,i){
var btn=document.createElement(‘button’);
btn.className=‘st’+(i===curSub[bigIdx]?’ ‘+sec.stab:’’);
btn.id=‘st-’+sec.id; btn.textContent=sec.label;
btn.onclick=function(){curSub[bigIdx]=i;buildSubtabs();renderCurrent();window.scrollTo({top:0,behavior:‘smooth’});};
stabs.appendChild(btn);
});
}

function renderCurrent(){
var secs=sectionsForBig(bigIdx);
var sec=secs[curSub[bigIdx]];
if(!sec) return;
renderSec(sec);
}

function renderSec(sec){
var s=state[sec.id],total=sec.qs.length;
var answered=Object.values(s).filter(function(x){return x.answered;}).length;
var correct=Object.values(s).filter(function(x){return x.correct;}).length;
var wrong=answered-correct;
var pf=document.getElementById(‘pf’); pf.style.width=(answered/total*100)+’%’; pf.style.background=sec.color;
var container=document.getElementById(‘sections’); container.innerHTML=’’;
var wrap=document.createElement(‘div’); wrap.className=‘wrap’;
var ref=document.createElement(‘div’); ref.className=‘ref’;
ref.innerHTML=’<div class="ref-title">📖 Quick Reference · AT · IN · ON</div><div class="ref-grid"><div class="rbox rbox-at"><div class="rbox-word">AT</div><div class="rbox-items"><span>⏰ at 9am · at noon · at night</span><span>🎄 at Christmas · at Easter</span><span>📍 at home · at work · at school</span><span>🚉 at the airport · at the door</span></div></div><div class="rbox rbox-in"><div class="rbox-word">IN</div><div class="rbox-items"><span>📅 in 2024 · in July · in summer</span><span>🌅 in the morning · in the evening</span><span>🌍 in Costa Rica · in San José</span><span>📦 in the box · in the room</span></div></div><div class="rbox rbox-on"><div class="rbox-word">ON</div><div class="rbox-items"><span>📆 on Monday · on June 15th</span><span>☀️ on Sunday morning</span><span>🪑 on the table · on the wall</span><span>🏢 on the 3rd floor · on the left</span></div></div></div>’;
wrap.appendChild(ref);
var stats=document.createElement(‘div’); stats.className=‘stats’;
stats.innerHTML=’<div class="stat"><div class="sv" style="color:var(--green)">’+correct+’</div><div class="sl">✅ Correctas</div></div><div class="stat"><div class="sv" style="color:var(--red)">’+wrong+’</div><div class="sl">❌ Incorrectas</div></div><div class="stat"><div class="sv" style="color:var(--gold)">’+(total-answered)+’</div><div class="sl">🃏 Quedan</div></div>’;
wrap.appendChild(stats);
var done=document.createElement(‘div’); done.className=‘done’+(answered===total?’ show’:’’); done.id=‘done-’+sec.id;
if(answered===total) fillDone(done,correct,total,sec);
wrap.appendChild(done);
sec.qs.forEach(function(q,qi){wrap.appendChild(buildCard(q,qi,sec));});
container.appendChild(wrap);
}

function buildCard(q,qi,sec){
var s=state[sec.id][qi];
var card=document.createElement(‘div’);
card.className=‘qcard’+(s.answered?(s.correct?’ ok’:’ fail’):’’); card.id=‘qc-’+sec.id+’-’+qi;
var sentHTML=q.sent.includes(’*****’)?q.sent.replace(/_{3,}/g,’<span class="gap">*****</span>’):q.sent;
var top=document.createElement(‘div’); top.className=‘qcard-top’;
top.innerHTML=’<div class="qmeta"><div class="qnum" id="qn-'+sec.id+'-'+qi+'">’+(s.answered?(s.correct?‘✓’:‘✗’):(qi+1))+’</div><span class="qtag '+q.tag+'">’+q.lbl+’</span><span class="qlbl">’+q.qtype+’</span></div><div class="qinstr">’+q.instr+’</div><div class="qsent">’+sentHTML+(q.sig?’<br><span class="sig">🔑 ‘+q.sig+’</span>’:’’)+’</div>’+(q.hint?’<div style="margin-top:5px;font-size:.67rem;color:var(--muted);font-family:\'DM Mono\',monospace">💡 ‘+q.hint+’</div>’:’’);
card.appendChild(top);
if(q.type===‘3btn’){
var row=document.createElement(‘div’); row.className=‘three-btns’;
[‘at’,‘in’,‘on’].forEach(function(prep){
var btn=document.createElement(‘div’);
var cls=‘prep-btn ‘+prep+(s.answered?’ dis’:’’);
if(s.answered){if(prep===q.ans)cls+=’ ok’;else if(prep===s.chosen&&prep!==q.ans)cls+=’ bad’;}
btn.className=cls;
btn.innerHTML=prep.toUpperCase()+’<span class="prep-btn-lbl">’+(prep===‘at’?‘punto’:prep===‘in’?‘interior’:‘superficie’)+’</span>’;
if(!s.answered) btn.onclick=function(){pick3btn(sec,qi,prep);};
row.appendChild(btn);
});
card.appendChild(row);
} else if(q.type===‘mc’){
var wrap=document.createElement(‘div’); wrap.className=‘opts’;
var letters=[‘A’,‘B’,‘C’,‘D’];
q.opts.forEach(function(opt,oi){
var div=document.createElement(‘div’); div.id=‘opt-’+sec.id+’-’+qi+’-’+oi;
var cls=‘opt’+(s.answered?’ dis’:’’)+(s.answered&&oi===q.ans?’ ok’:s.answered&&s.chosen===oi&&oi!==q.ans?’ bad’:’’);
div.className=cls; div.innerHTML=’<span class="ol">’+letters[oi]+’</span>’+opt;
if(!s.answered) div.onclick=function(){pickMC(sec,qi,oi);};
wrap.appendChild(div);
});
card.appendChild(wrap);
} else {
var wrap=document.createElement(‘div’); wrap.className=‘write-area’;
wrap.innerHTML=’<div class="wr"><input class=“wi” id=“wi-’+sec.id+’-’+qi+’” placeholder=“at / in / on ?”’+(s.answered?’ disabled’:’’)+’ onkeydown=“if(event.key==='Enter')checkWrite('’+sec.id+’',’+qi+’)”><button class=“chk” id=“wb-’+sec.id+’-’+qi+’” onclick=“checkWrite('’+sec.id+’',’+qi+’)”’+(s.answered?’ disabled’:’’)+’>Check ✓</button></div>’;
card.appendChild(wrap);
if(s.answered&&s.saved){setTimeout(function(){var wi=document.getElementById(‘wi-’+sec.id+’-’+qi);if(wi){wi.value=s.saved;wi.className=‘wi ‘+(s.correct?‘ok’:‘fail’);}},0);}
}
var fb=document.createElement(‘div’); fb.id=‘fb-’+sec.id+’-’+qi;
fb.className=‘fb’+(s.answered?’ show ‘+(s.correct?‘ok’:‘fail’):’’);
if(s.answered){fb.innerHTML=(s.correct?‘✅ <strong>Correct!</strong>’:‘❌ <strong>Incorrect.</strong>’)+’ ‘+q.exp+’<div class="cor">✓ ‘+q.cor+’</div><div class="rn"><strong>📐 Rule:</strong> ‘+q.rule+’</div>’;}
card.appendChild(fb);
return card;
}

function pick3btn(sec,qi,prep){
if(state[sec.id][qi].answered) return;
var q=sec.qs[qi], correct=prep===q.ans;
state[sec.id][qi]={answered:true,correct:correct,chosen:prep};
applyResult(sec,qi,correct,q);
}

function pickMC(sec,qi,oi){
if(state[sec.id][qi].answered) return;
var q=sec.qs[qi], correct=oi===q.ans;
state[sec.id][qi]={answered:true,correct:correct,chosen:oi};
q.opts.forEach(function(_,i){var el=document.getElementById(‘opt-’+sec.id+’-’+qi+’-’+i);if(!el)return;el.classList.add(‘dis’);el.onclick=null;if(i===q.ans)el.classList.add(‘ok’);else if(i===oi&&!correct)el.classList.add(‘bad’);});
applyResult(sec,qi,correct,q);
}

function checkWrite(secId,qi){
var sec=DATA.find(function(d){return d.id===secId;});
if(!sec||state[secId][qi].answered) return;
var q=sec.qs[qi];
var inp=document.getElementById(‘wi-’+secId+’-’+qi);
var btn=document.getElementById(‘wb-’+secId+’-’+qi);
if(!inp) return;
var val=inp.value.trim().toLowerCase().replace(/\s+/g,’ ’);
var correct=q.answers.some(function(a){return a.toLowerCase()===val||val.includes(a.toLowerCase());});
state[secId][qi]={answered:true,correct:correct,saved:inp.value};
inp.disabled=true; if(btn) btn.disabled=true;
inp.className=’wi ’+(correct?‘ok’:‘fail’);
applyResult(sec,qi,correct,q);
}

function applyResult(sec,qi,correct,q){
var card=document.getElementById(‘qc-’+sec.id+’-’+qi);
var num=document.getElementById(‘qn-’+sec.id+’-’+qi);
var fb=document.getElementById(‘fb-’+sec.id+’-’+qi);
if(card) card.classList.add(correct?‘ok’:‘fail’);
if(num)  num.textContent=correct?‘✓’:‘✗’;
if(fb){fb.innerHTML=(correct?‘✅ <strong>Correct!</strong>’:‘❌ <strong>Incorrect.</strong>’)+’ ‘+q.exp+’<div class="cor">✓ ‘+q.cor+’</div><div class="rn"><strong>📐 Rule:</strong> ‘+q.rule+’</div>’;fb.className=‘fb show ‘+(correct?‘ok’:‘fail’);}
if(correct){pts+=10;document.getElementById(‘g-pts’).textContent=pts;}
var s=state[sec.id],total=sec.qs.length;
var answered=Object.values(s).filter(function(x){return x.answered;}).length;
var corr=Object.values(s).filter(function(x){return x.correct;}).length;
var wrong=answered-corr;
var sv=document.querySelectorAll(’.sv’);
if(sv[0]) sv[0].textContent=corr;
if(sv[1]) sv[1].textContent=wrong;
if(sv[2]) sv[2].textContent=total-answered;
var pf=document.getElementById(‘pf’); if(pf) pf.style.width=(answered/total*100)+’%’;
if(answered===total) setTimeout(function(){var done=document.getElementById(‘done-’+sec.id);if(done){fillDone(done,corr,total,sec);done.classList.add(‘show’);done.scrollIntoView({behavior:‘smooth’,block:‘center’});}},500);
}

function fillDone(el,correct,total,sec){
var pct=Math.round(correct/total*100);
var secs=sectionsForBig(bigIdx);
var idx=secs.indexOf(sec);
var nextSec=secs[(idx+1)%secs.length];
el.innerHTML=’<div class="done-emoji">’+(pct>=90?‘🏆’:pct>=70?‘🎉’:pct>=50?‘📖’:‘💪’)+’</div>’+
‘<div class="done-score" style="color:'+sec.color+'">’+correct+’/’+total+’</div>’+
‘<div class="done-lbl">correctas en ‘+sec.label+’</div>’+
‘<div class="done-grade">’+(pct>=90?‘🔥 Perfect! You've mastered this.’:pct>=70?‘👍 Great work!’:pct>=50?‘📖 Good effort — review the rules.’:‘💪 Keep practicing!’)+’</div>’+
‘<div class="done-chips"><div class="dc dc-ok">✅ ‘+correct+’ correctas</div><div class="dc dc-fail">❌ ‘+(total-correct)+’ incorrectas</div><div class="dc dc-pts">⭐ +’+(correct*10)+’ pts</div></div>’+
‘<div class="done-btns"><button class="db db-p" onclick="restart(\''+sec.id+'\')">↺ Repetir</button><button class="db db-s" onclick="jumpTo(\''+nextSec.id+'\')">→ ‘+nextSec.label+’</button></div>’;
}

function restart(secId){
var sec=DATA.find(function(d){return d.id===secId;});
Object.values(state[secId]).forEach(function(s){if(s.correct)pts-=10;});
pts=Math.max(0,pts); document.getElementById(‘g-pts’).textContent=pts;
state[secId]={}; sec.qs.forEach(function(_,qi){state[secId][qi]={answered:false,correct:false};});
renderCurrent(); window.scrollTo({top:0,behavior:‘smooth’});
}

function jumpTo(secId){
var sec=DATA.find(function(d){return d.id===secId;});
var secs=sectionsForBig(sec.big);
bigIdx=sec.big; curSub[bigIdx]=secs.indexOf(sec);
BIG_TABS.forEach(function(_,i){var el=document.getElementById(‘b3-’+i);el.className=‘b3’+(i===bigIdx?’ ‘+BIG_TABS[i].activeClass:’’);});
buildSubtabs(); renderCurrent(); window.scrollTo({top:0,behavior:‘smooth’});
}

buildSubtabs();
renderCurrent();
</script>

</body>
</html>
